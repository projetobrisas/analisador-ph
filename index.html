<!DOCTYPE html>
<html>
<head>
  <title>Cientistas de Dados - Analisador de pH Pro</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
  <style>
    body { text-align: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f3; margin: 0; padding: 20px; }
    canvas { border-radius: 15px; box-shadow: 0 8px 16px rgba(0,0,0,0.3); margin: auto; display: block; }
    .info { background: white; padding: 20px; border-radius: 15px; margin-top: 20px; max-width: 450px; margin-left: auto; margin-right: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    #ph-val { font-size: 2.5em; font-weight: bold; color: #2c3e50; margin: 10px 0; }
    #rgb-display { color: #7f8c8d; font-family: monospace; font-size: 1.1em; }
    .cor-selecionada { width: 70px; height: 70px; margin: 15px auto; border: 4px solid #333; border-radius: 50%; transition: background 0.3s; }
    .legenda { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; margin-top: 20px; font-size: 0.8em; }
    .quadradinho { width: 20px; height: 20px; border-radius: 3px; border: 1px solid #ccc; }
  </style>
</head>
<body>
  <h2>🌿 Guardiãs da Terra: Analisador de pH</h2>
  <div id="canvas-container"></div>
  
  <div class="info">
    <p>Toque na fita de pH no vídeo para capturar a cor:</p>
    <div id="ph-val">pH: --</div>
    <div class="cor-selecionada" id="cor-box"></div>
    <div id="rgb-display">R: -- G: -- B: --</div>
    
    <hr>
    <p>Escala de Calibração:</p>
    <div id="lista-cores" class="legenda"></div>
