<!DOCTYPE html>
<html>
<head>
  <title>Cientistas de Dados - Analisador de pH Pro</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
  <style>
    body { text-align: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f3; margin: 0; padding: 20px; }
    canvas { border-radius: 15px; box-shadow: 0 8px 16px rgba(0,0,0,0.3); margin: auto; display: block; }
    .info { background: white; padding: 20px; border-radius: 15px; margin-top: 20px; max-width: 450px; margin-left: auto; margin-right: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    #ph-val { font-size: 2.5em; font-weight: bold; color: #2c3e50; margin: 10px 0; }
    #rgb-display { color: #7f8c8d; font-family: monospace; font-size: 1.1em; }
    .cor-selecionada { width: 70px; height: 70px; margin: 15px auto; border: 4px solid #333; border-radius: 50%; transition: background 0.3s; }
    .legenda { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; margin-top: 20px; font-size: 0.8em; }
    .quadradinho { width: 20px; height: 20px; border-radius: 3px; border: 1px solid #ccc; }
  </style>
</head>
<body>
  <h2>🌿 Guardiãs da Terra: Analisador de pH</h2>
  <div id="canvas-container"></div>
  
  <div class="info">
    <p>Toque na fita de pH no vídeo para capturar a cor:</p>
    <div id="ph-val">pH: --</div>
    <div class="cor-selecionada" id="cor-box"></div>
    <div id="rgb-display">R: -- G: -- B: --</div>
    
    <hr>
    <p>Escala de Calibração:</p>
    <div id="lista-cores" class="legenda"></div>
  </div>

  <script>
    let captura;
    
    // Gabarito Completo e Atualizado (com pH 10 corrigido)
    const GABARITO_PH = [
      { ph: 1,  r: 173, g: 86,  b: 74  }, { ph: 2,  r: 180, g: 83,  b: 63  },
      { ph: 3,  r: 206, g: 131, b: 72  }, { ph: 4,  r: 210, g: 161, b: 73  },
      { ph: 5,  r: 220, g: 184, b: 78  }, { ph: 6,  r: 216, g: 193, b: 85  },
      { ph: 7,  r: 172, g: 171, b: 80  }, { ph: 8,  r: 87,  g: 115, b: 69  },
      { ph: 9,  r: 55,  g: 95,  b: 74  }, { ph: 10, r: 33,  g: 54,  b: 20  },
      { ph: 11, r: 55,  g: 61,  b: 80  }, { ph: 12, r: 53,  g: 54,  b: 76  },
      { ph: 13, r: 68,  g: 55,  b: 80  }
    ];

    function setup() {
      let canvas = createCanvas(320, 240);
      canvas.parent('canvas-container');
      captura = createCapture({ video: { facingMode: "environment" } });
      captura.size(320, 240);
      captura.hide();
      
      // Criar a legenda visual automaticamente
      let lista = document.getElementById('lista-cores');
      GABARITO_PH.forEach(item => {
        let div = document.createElement('div');
        div.className = 'quadradinho';
        div.style.background = `rgb(${item.r},${item.g},${item.b})`;
        div.title = `pH ${item.ph}`;
        lista.appendChild(div);
      });
    }

    function draw() {
      image(captura, 0, 0, width, height);
      // Alvo central
      noFill();
      stroke(255);
      strokeWeight(2);
      ellipse(width/2, height/2, 30, 30);
      line(width/2 - 5, height/2, width/2 + 5, height/2);
      line(width/2, height/2 - 5, width/2, height/2 + 5);
    }

    function mousePressed() {
      if (mouseX >= 0 && mouseX <= width && mouseY >= 0 && mouseY <= height) {
        let cor = get(mouseX, mouseY);
        let r = red(cor);
        let g = green(cor);
        let b = blue(cor);
        
        // Atualiza a UI
        document.getElementById('cor-box').style.background = `rgb(${r},${g},${b})`;
        document.getElementById('rgb-display').innerText = `R:${Math.floor(r)} G:${Math.floor(g)} B:${Math.floor(b)}`;
        
        let phEncontrado = compararCores(r, g, b);
        document.getElementById('ph-val').innerText = "pH Estimado: " + phEncontrado;
      }
    }

    function compararCores(r, g, b) {
      let menorDistancia = Infinity;
      let phResultado = "--";

      for (let item of GABARITO_PH) {
        // Distância Euclidiana (Pitágoras 3D)
        let d = dist(r, g, b, item.r, item.g, item.b);
        if (d < menorDistancia) {
          menorDistancia = d;
          phResultado = item.ph;
        }
      }
      return phResultado;
    }
  </script>
</body>
</html>
